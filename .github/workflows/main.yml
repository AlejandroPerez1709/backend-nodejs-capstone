name: 'CI/CD'
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
jobs:
  lint_js:
    name: Lint JavaScript Files
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    - name: Install Node.js
      uses: actions/setup-node@v4
    - name: Install and Run Linter
      run: |
        npm init -y
        npm install eslint eslint-config-standard eslint@^8.0.1 eslint-plugin-import eslint-plugin-node eslint-plugin-promise
        find ./secondChance-backend -name app.js -exec ./node_modules/.bin/eslint {} +
        find ./secondChance-backend -name authRoutes.js -exec ./node_modules/.bin/eslint {} +
        find ./secondChance-backend -name secondChanceItemsRoutes.js -exec ./node_modules/.bin/eslint {} +
        find ./secondChance-backend -name searchRoutes.js -exec ./node_modules/.bin/eslint {} +
        echo "Linted all the js files successfully"

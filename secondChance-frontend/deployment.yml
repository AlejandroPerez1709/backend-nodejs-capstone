apiVersion: apps/v1
kind: Deployment
metadata:
  name: secondchancefrontend
  labels:
    app: secondchancefrontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secondchancefrontend
  template:
    metadata:
      labels:
        app: secondchancefrontend
    spec:
      imagePullSecrets:
        - name: icr
      containers:
      - name: secondchancefrontend-container
        image: us.icr.io/sn-labs-alejandrop25/secondchancefrontend
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: secondchance-frontend-service
spec:
  type: NodePort
  ports:
  - targetPort: 3000
    port: 3000
    protocol: TCP
  selector:
    app: secondchancefrontend
